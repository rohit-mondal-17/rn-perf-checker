buildscript {
  ext.RnPerfChecker = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }
    return RnPerfChecker[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply plugin: "com.facebook.react"

android {
  namespace "com.rnperfchecker"
  compileSdkVersion getExtOrDefault("compileSdkVersion")
  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
    externalNativeBuild {
      cmake {
        // Keep the shared STL
        arguments "-DANDROID_STL=c++_shared",
                  "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON",
                  "-DREACT_ANDROID_DIR=${rootProject.file("node_modules/react-native/ReactAndroid").absolutePath}",
                  "-DREACT_BUILD_DIR=${new File(rootProject.file("node_modules/react-native/ReactAndroid"), "build").absolutePath}"
        cppFlags "-O2 -frtti -fexceptions -Wall -Wno-unused-variable -fstack-protector-all -DANDROID"
      }
    }
  }
  externalNativeBuild {
    cmake {
        path "CMakeLists.txt"
    }
  }

  buildFeatures {
    buildConfig true
    prefab true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
}

// use patched hermes

def hermesEnabled = project.hasProperty("RNPerfHermesEnabled") && project.property("RNPerfHermesEnabled") == "true"

if (hermesEnabled) {
    configurations.all {
        resolutionStrategy.dependencySubstitution {
            substitute module("com.facebook.react:hermes-engine")
            using files("libs/hermes-engine.aar")
        }
    }
}
